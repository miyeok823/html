<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>📊 재고 대시보드</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#F4F7FA;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#1F4E78;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .title{
      font-size:18px;
      color:#666;
      margin-bottom:15px;
    }

    .value{
      font-size:32px;
      font-weight:bold;
      color:#1F4E78;
    }

  </style>
</head>

<body>

  <h1>📊 재고 및 판매 대시보드</h1>

  <div class="dashboard">

    <div class="card">
      <div class="title">총 판매 건수</div>
      <div class="value" id="sales">0</div>
    </div>

    <div class="card">
      <div class="title">총 매출액</div>
      <div class="value" id="revenue">0</div>
    </div>

    <div class="card">
      <div class="title">위험 재고 수</div>
      <div class="value" id="danger">0</div>
    </div>

  </div>

  <script>

    fetch("여기에_새_exec_URL_넣기")
      .then(response => response.json())
      .then(data => {

        document.getElementById("sales").innerText =
          data.totalSales;

        document.getElementById("revenue").innerText =
          data.totalRevenue.toLocaleString() + "원";

        document.getElementById("danger").innerText =
          data.dangerStock + "개";
      });

  </script>

</body>
</html>
