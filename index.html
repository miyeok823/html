<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>📊 재고 대시보드</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#F4F7FA;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      color:#1F4E78;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .title{
      font-size:18px;
      color:#666;
      margin-bottom:15px;
    }

    .value{
      font-size:32px;
      font-weight:bold;
      color:#1F4E78;
    }

    .charts{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
    }

    .chart-box{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

  </style>

</head>

<body>

  <h1>📊 재고 및 판매 대시보드</h1>

  <div class="dashboard">

    <div class="card">
      <div class="title">총 판매 건수</div>
      <div class="value" id="sales">0</div>
    </div>

    <div class="card">
      <div class="title">총 매출액</div>
      <div class="value" id="revenue">0</div>
    </div>

    <div class="card">
      <div class="title">위험 재고 수</div>
      <div class="value" id="danger">0</div>
    </div>

  </div>

  <div class="charts">

    <div class="chart-box">
      <canvas id="salesChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="stockChart"></canvas>
    </div>

  </div>

  <script>

    fetch("https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnSTrvQutoofrucYUx_YWZVFKeFuVWr7UPJa4XXYa9DP_MA-uSldCnBelxad-5hyx9ui_6j-ehMsvlY52cIixrQDGqJrE2XbMV5vwVxvTJIZeid84BC0GSrK9btKDWMBrEoq2k6jQzzT9BwhfdMEJjtmEQbxoplZXeAlkZFn38Jh1U3XqUExPttSVp_doWHqodCTWMkzj-c1fG_4Wa0Tr_0Baglss1EUAArODN5cD0DxzMw1QcXbEKIgbpKzqOVo0W113r8Wp3DTivybXIwhnC_ONMbC0Q&lib=MfY3J2-2_rBpRTqCPz8JdbEwZ7ki6rcAH")

      .then(response => response.json())

      .then(data => {

        document.getElementById("sales").innerText =
          data.totalSales;

        document.getElementById("revenue").innerText =
          data.totalRevenue.toLocaleString() + "원";

        document.getElementById("danger").innerText =
          data.dangerStock + "개";

        // 카테고리별 매출 차트
        new Chart(document.getElementById('salesChart'), {

          type: 'bar',

          data: {

            labels: data.categoryLabels,

            datasets: [{
              label: '카테고리별 매출',
              data: data.categoryValues
            }]
          }
        });

        // 재고 상태 차트
        new Chart(document.getElementById('stockChart'), {

          type: 'pie',

          data: {

            labels: ['안전 재고', '위험 재고'],

            datasets: [{

              data: [
                data.safeStock,
                data.dangerStock
              ]
            }]
          }
        });

      });

  </script>

</body>
</html>
