<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 대시보드</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1F4E78, #4F8CC9);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 50px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 420px;
    }

    h1 {
      font-size: 36px;
      color: #1F4E78;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      margin-bottom: 35px;
      font-size: 16px;
      line-height: 1.6;
    }

    .dashboard-btn {
      display: inline-block;
      padding: 16px 32px;
      background: #1F4E78;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }

    .dashboard-btn:hover {
      background: #163A5A;
      transform: translateY(-2px);
    }

    .emoji {
      font-size: 48px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="emoji">📊📦🚚</div>

    <h1>대시보드</h1>

    <p>
      재고 및 판매 현황을<br />
      실시간으로 확인해보세요.
    </p>

    <a
      class="dashboard-btn"
      href="https://script.google.com/macros/s/AKfycbyyteAMvWEN__H4h74v_7qWgt7P4nRsTilIbLC70U7nN4X0r_geZwr8agEhjirEavc2/exec"
      target="_blank"
    >
      🚀 대시보드 열기
    </a>

  </div>

</body>
</html>
